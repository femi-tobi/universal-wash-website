<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report - Laundry Management</title>
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>
    <div class="header">
        <h1>📊 Daily Sales Report</h1>
        <div class="user-info">
            <a href="dashboard.html"><button class="btn btn-secondary">← Back</button></a>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Stats Summary -->
        <div class="grid grid-3 mb-3">
            <div class="stat-card">
                <h3>Total Sales</h3>
                <div class="value" id="totalSales">0</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
                <h3>Paid Amount</h3>
                <div class="value" id="paidAmount">$0.00</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                <h3>Unpaid Amount</h3>
                <div class="value" id="unpaidAmount">$0.00</div>
            </div>
        </div>

        <div class="card">
            <h2 class="text-center">Today: <span id="todayDate"></span></h2>

            <div style="margin-top:18px;">
                <table style="width:100%;border-collapse:collapse;font-size:14px" id="salesTable">
                    <thead>
                        <tr style="text-align:left;border-bottom:1px solid #ddd">
                            <th style="padding:8px;">Time</th>
                            <th style="padding:8px;">Slip</th>
                            <th style="padding:8px;">Customer</th>
                            <th style="padding:8px;text-align:right">Total</th>
                            <th style="padding:8px;">Status</th>
                            <th style="padding:8px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="salesBody">
                        <tr><td colspan="6" style="text-align:center;padding:18px;color:#666">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        checkAuth();

        // Display today's date
        const today = new Date().toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        document.getElementById('todayDate').textContent = today;

        // Load daily stats + transaction list
        async function loadDailyReport() {
            try {
                // staff-specific full list with items
                const res = await fetch('/api/staff/me/sales/daily', { headers: getAuthHeaders() });
                if (!res.ok) throw new Error('Failed to fetch sales');
                const payload = await res.json();
                const sales = payload.sales || [];
                // derive simple summary from the sales data
                let paid = 0, unpaid = 0;
                sales.forEach(s => { if (s.payment_status === 'paid') paid += Number(s.total_amount||0); else unpaid += Number(s.total_amount||0); });
                document.getElementById('totalSales').textContent = sales.length || 0;
                document.getElementById('paidAmount').textContent = '$' + (paid).toFixed(2);
                document.getElementById('unpaidAmount').textContent = '$' + (unpaid).toFixed(2);

                const tbody = document.getElementById('salesBody');
                tbody.innerHTML = '';
                if (sales.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:18px;color:#666">No sales for today.</td></tr>';
                }

                sales.forEach(sale => {
                    const tr = document.createElement('tr');
                    const d = new Date(sale.created_at);
                    const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    tr.innerHTML = `
                        <td style="padding:8px;vertical-align:top">${time}</td>
                        <td style="padding:8px;vertical-align:top">#${String(sale.id).padStart(8,'0')}</td>
                        <td style="padding:8px;vertical-align:top">${sale.customer_name || 'Walk-in'}</td>
                        <td style="padding:8px;text-align:right;vertical-align:top">${Number(sale.total_amount).toLocaleString()}</td>
                        <td style="padding:8px;vertical-align:top">${sale.payment_status || '—'}${sale.payment_method ? ' ('+sale.payment_method.toUpperCase()+')' : ''}</td>
                        <td style="padding:8px;vertical-align:top">
                            <button onclick="toggleItems(${sale.id})" class="btn btn-sm">Items</button>
                            <a class="btn btn-sm" href="receipt.html?id=${sale.id}" target="_blank">Receipt</a>
                        </td>
                    `;
                    tbody.appendChild(tr);

                    // item details row (hidden)
                    const det = document.createElement('tr');
                    det.id = 'items-' + sale.id;
                    det.style.display = 'none';
                    det.innerHTML = `<td colspan="6" style="padding:8px;background:#fafafa">
                        ${renderItemsHtml(sale.items || [], sale.id)}
                    </td>`;
                    tbody.appendChild(det);
                });

            } catch (error) {
                console.error('Error loading report:', error);
                document.getElementById('salesBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:18px;color:red">Failed to load sales.</td></tr>';
            }
        }

        function renderItemsHtml(items, saleId) {
            if (!items || items.length === 0) return '<div style="color:#666">No items recorded.</div>';
            let html = '<table style="width:100%;font-size:13px;border-collapse:collapse">';
            html += '<thead><tr style="text-align:left"><th>Item</th><th>Service</th><th>Qty</th><th style="text-align:right">Amount</th></tr></thead>';
            html += '<tbody>';
            items.forEach(it => {
                html += `<tr>
                    <td style="padding:6px 8px">
                        ${(it.item_type||'').toUpperCase()}
                        <div id="desc-${it.id}" style="font-size:12px;color:#666;margin-top:4px">${it.description?escapeHtml(it.description):'<span style=\"color:#999\">(no description)</span>'}</div>
                        <div style="margin-top:6px"><button class="btn btn-xs" onclick="startEditDesc(${it.id}, ${saleId})">Edit</button></div>
                    </td>
                    <td style="padding:6px 8px">${it.service_name||''}</td>
                    <td style="padding:6px 8px">${it.quantity||1}</td>
                    <td style="padding:6px 8px;text-align:right">${Number(it.subtotal||0).toLocaleString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            return html;
        }

        // Inline edit handlers for item descriptions
        function startEditDesc(itemId, saleId) {
            const container = document.getElementById('desc-' + itemId);
            if (!container) return;
            const current = container.textContent === '(no description)' ? '' : container.textContent;
            container.innerHTML = `<textarea id="ta-${itemId}" style="width:100%;min-height:60px">${escapeHtml(current)}</textarea>
                <div style="margin-top:6px">
                    <button class="btn btn-sm" onclick="saveDesc(${itemId}, ${saleId})">Save</button>
                    <button class="btn btn-secondary" onclick="cancelEditDesc(${itemId}, ${saleId})">Cancel</button>
                </div>`;
        }

        async function saveDesc(itemId, saleId) {
            const ta = document.getElementById('ta-' + itemId);
            if (!ta) return;
            const newDesc = ta.value.trim();
            try {
                const res = await fetch('/api/sale_items/' + itemId, {
                    method: 'PATCH',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ description: newDesc })
                });
                const j = await res.json();
                if (!res.ok) throw new Error(j.error || 'Failed to save');
                const container = document.getElementById('desc-' + itemId);
                container.innerHTML = newDesc ? escapeHtml(newDesc) : '<span style="color:#999">(no description)</span>';
            } catch (err) {
                console.error('Save failed', err);
                alert('Failed to save description: ' + (err.message || 'server error'));
            }
        }

        function cancelEditDesc(itemId, saleId) {
            // reload the sale row to restore original (simple approach: toggle items off/on)
            const det = document.getElementById('items-' + saleId);
            if (!det) return;
            // toggle to force re-render by reloading report
            det.style.display = 'none';
            // reload the whole report to preserve consistency
            loadDailyReport();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function toggleItems(id) {
            const el = document.getElementById('items-' + id);
            if (!el) return;
            el.style.display = el.style.display === 'none' ? '' : 'none';
        }

        loadDailyReport();
    </script>
</body>

</html>
